version: '3.9'

services:
  erpura:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erpura_frontend
    restart: unless-stopped
    networks:
      - coolify
    labels:
      # Traefik: HTTPS
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.erpura-https.rule=Host(`erpura.virtuenet.space`)"
      - "traefik.http.routers.erpura-https.entrypoints=https"
      - "traefik.http.routers.erpura-https.tls=true"
      - "traefik.http.routers.erpura-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.erpura-https.service=erpura-svc"
      - "traefik.http.services.erpura-svc.loadbalancer.server.port=80"
      # Traefik: HTTP -> HTTPS redirect
      - "traefik.http.routers.erpura-http.rule=Host(`erpura.virtuenet.space`)"
      - "traefik.http.routers.erpura-http.entrypoints=http"
      - "traefik.http.routers.erpura-http.middlewares=erpura-redirect-https"
      - "traefik.http.middlewares.erpura-redirect-https.redirectscheme.scheme=https"

networks:
  coolify:
    external: true
